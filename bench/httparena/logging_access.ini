# logging_access.ini — Python logging configuration for BlackBull HttpArena workers
#
# Loaded by bench/httparena/app.py via logging.config.fileConfig() when this
# file is present at startup (path: /app/logging_access.ini inside the container).
#
# Purpose: enable the blackbull.access logger so per-request access log lines
# are emitted to stderr with an [ACCESS] prefix.  stderr is captured by
# `docker logs`, which benchmark.sh's save_result() writes to
# site/static/logs/<profile>/<conns>/blackbull.log before the container is
# removed.  httparena_compare.sh then greps [ACCESS] lines from that file to
# produce a standalone bb-access-blackbull-<profile>.log.
#
# Deployment:
#   bench/aws/httparena_compare.sh copies this file alongside app.py / launcher.py
#   into the framework directory and the Dockerfile COPYs it to /app/.
#   When BB_ACCESS_LOG is unset or 0, this file is NOT copied, so the
#   fileConfig call in app.py silently skips it and access logging stays off.
[loggers]
keys=root,blackbull_access

[handlers]
keys=full_file,access_file

[formatters]
keys=full,access

[logger_root]
level=INFO
handlers=full_file

[logger_blackbull_access]
level=INFO
handlers=access_file
qualname=blackbull.access
propagate=0

[handler_full_file]
class=FileHandler
level=INFO
formatter=full
args=('/results/blackbull-full.log', 'a')

[handler_access_file]
class=FileHandler
level=INFO
formatter=access
args=('/results/blackbull-access.log', 'a')

[formatter_full]
format=%(asctime)s %(process)d %(levelname)s %(name)s %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_access]
format=[ACCESS] %(asctime)s %(process)d %(message)s
datefmt=%Y-%m-%d %H:%M:%S
