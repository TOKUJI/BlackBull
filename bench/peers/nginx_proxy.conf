# Sprint 14 — nginx HTTPS frontend + cleartext HTTP upstream.
#
# Used by bench/peers/run_peer.sh for the *-nginx topology variants
# (blackbull-nginx, uvicorn-nginx, granian-nginx).  The base server
# binds cleartext on __BB_UPSTREAM_PORT__ (typically 8444); nginx
# listens on __BB_LISTEN_PORT__ (typically 8443) with TLS and reverse-
# proxies everything to the upstream.
#
# Compared to bench/peers/nginx.conf (static reference floor): this
# config does NOT serve content directly — it only terminates TLS and
# forwards.  All routing logic stays in the upstream ASGI app.
#
# Run via:
#   bash bench/peers/run_peer.sh blackbull-nginx 8443 tests/cert.pem tests/key.pem
# (run_peer.sh substitutes __BB_* placeholders into a /tmp copy.)

worker_processes 1;
daemon off;
pid /tmp/bench-nginx-proxy.pid;
error_log /tmp/bench-nginx-proxy-error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    keepalive_requests 10000000;

    # Upstream keepalive — without these directives nginx opens a new TCP
    # connection to the upstream for *every* request, which would measure
    # connection-establishment cost, not steady-state request cost.
    upstream backend {
        server 127.0.0.1:__BB_UPSTREAM_PORT__;
        keepalive 256;
        keepalive_requests 10000000;
        keepalive_timeout 60s;
    }

    server {
        listen __BB_LISTEN_PORT__ ssl http2 backlog=4096 reuseport;

        ssl_certificate     __BB_CERT__;
        ssl_certificate_key __BB_KEY__;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # One catch-all proxy block — all routing happens in the upstream
        # ASGI app (bench/peers/asgi_app.py).
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Don't buffer responses — keeps latency comparable to the
            # standalone-server topology where there's no intermediary.
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
