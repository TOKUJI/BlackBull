# Reference floor — nginx serving the comparable routes directly,
# no Python upstream. The point is to measure the WSL2 + TLS + HTTP
# parser floor on this hardware; anything BlackBull/uvicorn/etc. does
# above this floor is its own runtime cost.
#
# Run via: bash bench/peers/run_peer.sh nginx 8443 tests/cert.pem tests/key.pem
# (run_peer.sh launches nginx with -p $PWD -c bench/peers/nginx.conf so
#  the relative paths below resolve from the repo root.)

worker_processes 1;
daemon off;
pid /tmp/bench-nginx.pid;
error_log /tmp/bench-nginx-error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 60;
    keepalive_requests 10000000;

    server {
        listen 8443 ssl http2 backlog=4096 reuseport;

        # Placeholders — run_peer.sh substitutes ABS paths into a /tmp copy
        # before launching nginx. (nginx resolves paths against its compiled
        # prefix /etc/nginx, not against -p, so relative paths break.)
        ssl_certificate     __BB_CERT__;
        ssl_certificate_key __BB_KEY__;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Comparable (public-board) routes — static, no upstream.
        # /ping mirrors asgi_app.py: 200 text/html with body "pong".
        # k6's http_stress.js / http_rampup.js default TARGET=/ping, so this
        # must exist for Lane C to compare apples-to-apples against the ASGI
        # peers — otherwise nginx returns 404 and http_req_failed reads 100%.
        location = /ping {
            default_type text/html;
            return 200 'pong';
        }
        location = /plaintext {
            default_type text/plain;
            return 200 'Hello, World!';
        }
        location = /json {
            default_type application/json;
            return 200 '{"message":"Hello, World!"}';
        }

        # Internal routes — large-response sweep.
        # nginx-built-in length-N body uses `return` with a string; for the
        # 16k/64k/1mb sizes we serve from /dev/zero-derived files generated
        # at start-up in /tmp.  The bench/install.sh prepares those.
        location = /1kb       { default_type application/octet-stream; alias /tmp/bench_1kb.bin;  }
        location = /16kb      { default_type application/octet-stream; alias /tmp/bench_16kb.bin; }
        location = /64kb      { default_type application/octet-stream; alias /tmp/bench_64kb.bin; }
        location = /1mb       { default_type application/octet-stream; alias /tmp/bench_1mb.bin;  }

        # /echo POST — nginx can echo a request body back via lua, but
        # we skip echo for the floor (no Python anyway makes /echo not
        # a meaningful "what does nginx do here" question).  wrk B6/B7
        # will get 405 (Method Not Allowed) for nginx; the report flags
        # rows as N/A.
        location = /echo {
            return 405 'nginx floor does not serve POST';
        }

        # WebSocket — out of scope for the floor (nginx's WS is a proxy,
        # not a terminator).  Lane D will skip nginx via the orchestrator.
    }
}
