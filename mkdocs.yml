site_name: BlackBull
site_description: Async ASGI web framework for HTTP/1.1, HTTP/2, and WebSocket
site_url: https://TOKUJI.github.io/BlackBull/
repo_url: https://github.com/TOKUJI/BlackBull
repo_name: TOKUJI/BlackBull

theme:
  name: material

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - User Guide: guide.md
  - API Reference: api/
