site_name: BlackBull
site_description: Async ASGI web framework for HTTP/1.1, HTTP/2, and WebSocket
site_url: https://TOKUJI.github.io/BlackBull/
repo_url: https://github.com/TOKUJI/BlackBull
repo_name: TOKUJI/BlackBull

theme:
  name: material

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Hello World: getting-started/hello-world.md
    - Your First App: getting-started/first-app.md
  - Guide:
    - Overview: guide/index.md
    - Routing: guide/routing.md
    - Middleware: guide/middleware.md
    - Error handling: guide/error-handling.md
    - Requests and responses: guide/requests-and-responses.md
    - WebSockets: guide/websockets.md
    - HTTP/2: guide/http2.md
    - Streaming: guide/streaming.md
    - Events: guide/events.md
    - Logging: guide/logging.md
    - Static files: guide/static-files.md
    - Configuration: guide/configuration.md
    - Extensions: guide/extensions.md
    - OpenAPI: guide/openapi.md
    - Testing: guide/testing.md
    - Fault injection: guide/fault_injection.md
  - Deployment:
    - Running BlackBull: deployment/running.md
    - Workers: deployment/workers.md
    - TLS: deployment/tls.md
    - Behind nginx: deployment/behind-nginx.md
    - Unix and fd inheritance: deployment/unix-and-fd.md
    - Hot reload: deployment/hot-reload.md
  - Reference:
    - Environment variables: reference/env-vars.md
    - API: api/
  - About:
    - Conformance: about/conformance.md
    - Internals: about/internals.md
    - RFC 9113, implemented: about/rfc9113-implementation.md
    - gRPC assessment: about/grpc-assessment.md
