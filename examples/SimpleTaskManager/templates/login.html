<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Task Manager — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #333; text-align: center; }
    label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,.2); }
    button {
      width: 100%;
      padding: .65rem;
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    #error {
      color: #d32f2f;
      font-size: .85rem;
      margin-top: .75rem;
      text-align: center;
      min-height: 1.2em;
    }
    .alt-link {
      text-align: center;
      margin-top: 1.25rem;
      font-size: .875rem;
      color: #666;
    }
    .alt-link a { color: #4a90e2; text-decoration: none; }
    .alt-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Task Manager</h1>
    <form id="loginForm">
      <label for="username">ユーザー名</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">ログイン</button>
      <div id="error"></div>
    </form>
    <div class="alt-link">アカウントをお持ちでない方は <a href="/register">新規登録</a></div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.textContent = '';
      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.ok) {
          sessionStorage.setItem('token', data.token);
          location.href = '/app';
        } else {
          errEl.textContent = data.error || 'ログインに失敗しました';
        }
      } catch {
        errEl.textContent = 'サーバーに接続できません';
      }
    });
  </script>
</body>
</html>
