<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f0f2f5;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: .75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; }

    #header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    #status { font-size: .75rem; opacity: .8; }

    #logout-btn {
      padding: .35rem .75rem;
      font-size: .8rem;
      background: rgba(255, 255, 255, .15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .4);
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    #logout-btn:hover { background: rgba(255, 255, 255, .25); }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      padding: .75rem;
      gap: .75rem;
    }

    /* Message pane */
    #msg-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .msg { margin-bottom: .75rem; }
    .meta {
      font-size: .75rem;
      color: #6b7280;
      margin-bottom: .125rem;
    }
    .meta strong { color: #1f2937; }
    .text {
      background: #f3f4f6;
      padding: .5rem .75rem;
      border-radius: 6px;
      display: inline-block;
      max-width: 80%;
    }
    .msg.sys .text {
      background: #ede9fe;
      color: #5b21b6;
      font-style: italic;
    }

    #send-area {
      display: flex;
      gap: .5rem;
      padding: .75rem;
      border-top: 1px solid #e5e7eb;
    }
    #inp {
      flex: 1;
      padding: .5rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
    }
    #send-btn {
      padding: .5rem 1rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    #send-btn:hover { background: #4338ca; }

    /* Participant pane */
    #part-pane {
      width: 200px;
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      overflow-y: auto;
    }
    #part-pane h2 {
      font-size: .875rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: .75rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .participant {
      padding: .375rem 0;
      font-size: .9rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .participant::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Chat</h1>
    <div id="header-right">
      <span id="status">Connecting&hellip;</span>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="main">
    <div id="msg-pane">
      <div id="messages"></div>
      <div id="send-area">
        <input id="inp" type="text" placeholder="Type a message&hellip;" autocomplete="off">
        <button id="send-btn" onclick="sendMsg()">Send</button>
      </div>
    </div>

    <div id="part-pane">
      <h2>Participants</h2>
      <div id="participants"></div>
    </div>
  </div>

  <script>
    const msgsEl   = document.getElementById('messages');
    const partEl   = document.getElementById('participants');
    const statusEl = document.getElementById('status');
    const inp      = document.getElementById('inp');

    inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendMsg(); });

    function getCookie(name) {
      const m = document.cookie.match('(?:^|;)\\s*' + name + '=([^;]*)');
      return m ? decodeURIComponent(m[1]) : null;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function addMsg(msg, sys) {
      const d = document.createElement('div');
      d.className = 'msg' + (sys ? ' sys' : '');
      if (!sys) {
        const ts = new Date(msg.timestamp).toLocaleTimeString();
        d.innerHTML =
          '<div class="meta"><strong>' + esc(msg.username) + '</strong> ' + ts + '</div>' +
          '<div class="text">' + esc(msg.message) + '</div>';
      } else {
        d.innerHTML = '<div class="text">' + esc(msg.message) + '</div>';
      }
      msgsEl.appendChild(d);
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    function setParts(list) {
      partEl.innerHTML = list
        .map(p => '<div class="participant">' + esc(p.username) + '</div>')
        .join('');
    }

    function handle(evt) {
      if      (evt.type === 'message')    addMsg(evt.payload);
      else if (evt.type === 'history')    evt.payload.forEach(m => addMsg(m));
      else if (evt.type === 'user_join')  {
        setParts(evt.payload.participants);
        addMsg({ message: esc(evt.payload.username) + ' joined',
                 timestamp: new Date().toISOString() }, true);
      }
      else if (evt.type === 'user_leave') {
        setParts(evt.payload.participants);
        addMsg({ message: esc(evt.payload.username) + ' left',
                 timestamp: new Date().toISOString() }, true);
      }
    }

    async function sendMsg() {
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      await fetch('/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
    }

    async function logout() {
      _polling = false;
      await fetch('/logout', { method: 'POST' });
      window.location.href = '/';
    }

    const method = getCookie('chat_method') || 'poll';

    // ---- WebSocket ----
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(proto + '://' + location.host + '/ws');
      ws.onopen    = () => { statusEl.textContent = 'Connected (WebSocket)'; };
      ws.onmessage = e => { handle(JSON.parse(e.data)); };
      ws.onerror   = () => { statusEl.textContent = 'WebSocket error - retrying...'; };
      ws.onclose   = () => {
        statusEl.textContent = 'Disconnected';
        setTimeout(connectWS, 3000);
      };
    }

    // ---- SSE ----
    function connectSSE() {
      if (!window.EventSource) {
        statusEl.textContent = 'SSE not supported by this browser';
        return;
      }
      const es = new EventSource('/sse');
      es.onopen    = () => { statusEl.textContent = 'Connected (SSE)'; };
      es.onmessage = e => { handle(JSON.parse(e.data)); };
      es.onerror   = () => { statusEl.textContent = 'SSE error - check HTTP/2 is available'; };
    }

    // ---- Long Polling ----
    let _polling = true;
    async function poll() {
      while (_polling) {
        try {
          const r = await fetch('/poll');
          if (r.ok) {
            const evts = await r.json();
            evts.forEach(handle);
          }
        } catch (e) {
          await new Promise(r => setTimeout(r, 2000));
        }
      }
    }
    function connectPoll() {
      statusEl.textContent = 'Connected (Long Polling)';
      poll();
    }

    if      (method === 'websocket') connectWS();
    else if (method === 'sse')       connectSSE();
    else                             connectPoll();
  </script>
</body>
</html>
