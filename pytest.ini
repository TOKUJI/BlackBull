[pytest]
asyncio_mode = strict
log_file = test.log
log_format = %(asctime)s %(levelname)s %(filename)s:%(lineno)d %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
log_level = debug

# bench/results/ holds gitignored benchmark output, including
# snapshots of test_parser.py captured by full_ab.sh's baseline /
# treatment file-snapshot machinery.  Without an exclude pytest
# would auto-discover those copies and choke on duplicate-module
# collection.
norecursedirs = bench/results .venv site

addopts = --strict-markers
markers =
    integration: integration tests
    system: system tests
    production: production tests
    slow: slow tests
    docker: docker dependent tests
    network: network tests
    properties: property-based tests (Hypothesis)