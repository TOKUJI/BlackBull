name: CodeQL

# Python static analysis via GitHub's CodeQL.  Runs on every PR
# touching code, on pushes to master, and weekly to catch advisories
# that land between PRs.
#
# Third-party actions pinned to commit SHA per the supply-chain
# hygiene baseline; Dependabot tracks updates in
# .github/dependabot.yml.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '23 5 * * 1'   # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write   # required to upload CodeQL results
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9   # v4.37.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          # Scope quality lint to shipped code (blackbull/ + examples/);
          # ignore tests/bench/templates/docs.  See the config file header.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e   # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e   # v4.36.2
        with:
          category: '/language:${{ matrix.language }}'
