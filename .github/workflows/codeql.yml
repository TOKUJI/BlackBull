name: CodeQL

# Python static analysis via GitHub's CodeQL.  Runs on every PR
# touching code, on pushes to master, and weekly to catch advisories
# that land between PRs.
#
# Third-party actions pinned to commit SHA per the supply-chain
# hygiene baseline; Dependabot tracks updates in
# .github/dependabot.yml.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '23 5 * * 1'   # weekly, Monday 05:23 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write   # required to upload CodeQL results
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9887d98ae49f1f598651b556d8c8f02f3ea065cb   # v3.27.0
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@9887d98ae49f1f598651b556d8c8f02f3ea065cb   # v3.27.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9887d98ae49f1f598651b556d8c8f02f3ea065cb   # v3.27.0
        with:
          category: '/language:${{ matrix.language }}'
