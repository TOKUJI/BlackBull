name: RFC conformance

# Runs the protocol conformance suites against a live BlackBull on a
# fresh ubuntu-latest runner.  Three independent jobs so a single
# tool's flake doesn't take the whole workflow down:
#
#   h2spec         — RFC 7540 + RFC 7541 (HTTP/2 + HPACK)
#   autobahn       — RFC 6455 (WebSocket)
#   corpus-replay  — docker-free regression replay of the curated
#                     fuzz/user-corpus/ diff entries
#   h2-flow-control — docker-free RFC 9113 flow-control deadlock gate
#                     (the three payload > 65535-byte deadlocks fixed
#                     in v0.46.0, plus a large 128 KiB bidirectional
#                     stress), subprocess-isolated per scenario
#   grpc-interop   — docker-free real-client (grpcio) gRPC interop over
#                     h2c: the only test that puts a spec-strict external
#                     gRPC client on the wire (guards the Trailers-Only
#                     framing regression fixed in Sprint 58)
#
# The workflow's pass/fail status becomes the badge linked from the
# README.  An individual job failure surfaces in the badge as a red
# "failure" — the per-job artefacts (JUnit XML for h2spec,
# index.json for Autobahn, pytest output for corpus-replay) carry
# the detail.
#
# Third-party actions pinned to commit SHAs per the supply-chain
# hygiene baseline (Sprint 30 Task 6); Dependabot tracks updates.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly Sunday 03:17 UTC — picks up upstream h2spec / Autobahn
    # image changes even when master is quiet.
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  h2spec:
    name: h2spec (RFC 7540 + 7541)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install BlackBull (with compression for full surface)
        run: pip install -e '.[compression]'

      - name: Install h2spec
        # `$HOME/.local/bin` isn't pre-created on a fresh ubuntu-latest
        # runner — `tar -C` into a missing directory exits non-zero.
        # mkdir first, then add to GITHUB_PATH so subsequent steps see it.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -L -sS \
            https://github.com/summerwind/h2spec/releases/download/v2.6.0/h2spec_linux_amd64.tar.gz \
            | tar -xz -C "$HOME/.local/bin" h2spec
          chmod +x "$HOME/.local/bin/h2spec"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/h2spec" --version

      - name: Generate self-signed TLS material
        run: |
          openssl req -x509 -newkey rsa:2048 \
            -keyout tests/key.pem -out tests/cert.pem \
            -days 365 -nodes -subj '/CN=localhost'

      - name: Start BlackBull HTTPS+H2 server
        run: |
          set -euo pipefail
          # Background, stdout → file (PIPE deadlocks under load — see
          # Sprint 10's recorded caution).
          python bench/conformance/h2spec_app.py \
              --port 8443 \
              --cert tests/cert.pem --key tests/key.pem \
              > /tmp/h2spec_server.log 2>&1 &
          echo "BB_PID=$!" >> "$GITHUB_ENV"
          # Wait for the listener to accept connections (up to 15 s).
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/8443) 2>/dev/null; then
              echo "server listening after ${i} probe(s)"
              break
            fi
            sleep 0.5
          done

      - name: Run h2spec
        # h2spec_run.sh resolves `h2spec` via PATH; the Install step
        # added `$HOME/.local/bin` to GITHUB_PATH so it's reachable here.
        run: bash bench/conformance/h2spec_run.sh

      - name: Stop BlackBull
        if: always()
        run: |
          if [ -n "${BB_PID:-}" ]; then kill "$BB_PID" 2>/dev/null || true; fi

      - name: Upload h2spec results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: h2spec-results
          path: |
            bench/conformance/results/h2spec_*.xml
            bench/conformance/results/h2spec_*.txt
            /tmp/h2spec_server.log
          retention-days: 30
          if-no-files-found: warn

  autobahn:
    name: Autobahn (RFC 6455 WebSocket)
    runs-on: ubuntu-latest
    # 25, not 15: the suite normally executes in 10.5–11.5 min, of which
    # ~97% is permessage-deflate groups 12+13 — pure CPU on both ends, so
    # shared-runner contention can stretch it well past a 15-min cap
    # (cancelled runs on 2026-07-05, 2026-07-08, 2026-07-10).  Profiled
    # 2026-07-11: BlackBull matches the `websockets` reference within 5%
    # under wstest, so the duration is inherent to the suite, not a
    # server-side regression to chase.
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install BlackBull
        run: pip install -e '.[compression]'

      - name: Start BlackBull WebSocket echo server
        run: |
          set -euo pipefail
          python bench/conformance/autobahn_app.py --port 9001 \
              > /tmp/autobahn_server.log 2>&1 &
          echo "BB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/9001) 2>/dev/null; then
              echo "WS server listening after ${i} probe(s)"
              break
            fi
            sleep 0.5
          done

      - name: Run Autobahn|Testsuite
        run: bash bench/conformance/autobahn_run.sh

      - name: Assert no failing Autobahn cases
        run: |
          set -euo pipefail
          # Locate the freshest index.json under bench/conformance/results/autobahn_*/
          INDEX=$(ls -1t bench/conformance/results/autobahn_*/index.json 2>/dev/null | head -1)
          if [ -z "$INDEX" ]; then
            echo "ERROR: no Autobahn index.json produced" >&2
            exit 1
          fi
          echo "Parsing $INDEX"
          # behavior + behaviorClose must both be OK or NON-STRICT;
          # anything else (FAILED, UNCLEAN, INFORMATIONAL) is a regression.
          BAD=$(jq -r '
            ."BlackBull" | to_entries
            | map(select(
                  (.value.behavior != "OK" and .value.behavior != "NON-STRICT" and .value.behavior != "INFORMATIONAL")
                  or
                  (.value.behaviorClose != "OK" and .value.behaviorClose != "INFORMATIONAL")
              ))
            | map(.key)
            | .[]
          ' "$INDEX" | tr '\n' ' ')
          if [ -n "$BAD" ]; then
            echo "FAIL: Autobahn cases with non-OK behavior: $BAD" >&2
            exit 1
          fi
          echo "All Autobahn cases pass with OK / NON-STRICT / INFORMATIONAL."

      - name: Stop BlackBull
        if: always()
        run: |
          if [ -n "${BB_PID:-}" ]; then kill "$BB_PID" 2>/dev/null || true; fi

      - name: Upload Autobahn results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: autobahn-results
          path: |
            bench/conformance/results/autobahn_*
            /tmp/autobahn_server.log
          retention-days: 30
          if-no-files-found: warn

  corpus-replay:
    name: HTTP/1.1 user-corpus replay
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install BlackBull (with testing extras)
        run: pip install -e '.[testing]'

      - name: Run docker-free corpus replay
        run: |
          timeout 60 python -m pytest --timeout=30 -v \
              tests/conformance/http1/test_h1_user_corpus_replay.py

  h2-flow-control:
    name: H2 flow-control deadlock gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install BlackBull (with testing extras)
        run: pip install -e '.[testing]'

      - name: Run H2 flow-control deadlock regression gate
        # Docker-free, subprocess-isolated regression gate for the three RFC
        # 9113 flow-control deadlocks fixed in v0.46.0 (client crediting,
        # sender lost-wakeup, WU-on-closed-stream) plus a large 128 KiB
        # bidirectional payload that forces multiple WINDOW_UPDATE refills in
        # both directions.  Each scenario runs in a child interpreter
        # (`sys.executable`) with an 8s per-step guard; the outer 90s bounds
        # the whole job in case the subprocess guard itself wedges.  Runs on
        # every push/PR so a reintroduced deadlock blocks merge instead of
        # surfacing only in the weekly full tier.
        run: |
          timeout 90 python -m pytest --timeout=60 -v \
              tests/conformance/http2/test_h2_flow_control_deadlock.py

  grpc-interop:
    name: gRPC real-client interop (h2c)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install BlackBull (with testing + grpcio interop client)
        # grpc-interop pulls in grpcio — the spec-strict third-party client —
        # plus the grpcio-reflection/health/status client packages for the
        # protobuf-layer suite.  Without them the interop modules skip
        # (pytest.importorskip), so the gate would silently pass on nothing;
        # install them explicitly here.
        run: pip install -e '.[testing,grpc-interop]'

      - name: Install blackbull-protobuf (protobuf interop layer)
        # Server side of the protobuf-layer interop suite
        # (test_grpc_protobuf_interop.py).  --no-deps keeps pip from
        # fighting the editable checkout over the blackbull version floor;
        # every real dependency already arrives via grpc-interop above.
        run: pip install --no-deps blackbull-protobuf

      - name: Run real-client gRPC interop conformance
        # Docker-free interop gate: a real grpcio client drives BlackBull's
        # unary + streaming gRPC over a real h2c socket.  Guards three
        # regressions against a spec-strict peer:
        #   - Trailers-Only framing (Sprint 58) — grpc-status must land in a
        #     trailing HEADERS frame or strict clients decode every error as
        #     UNKNOWN;
        #   - consume-based inbound flow control (Sprint 62 deferral) — the
        #     over-window client-streaming/bidi gates
        #     (test_large_request_stream_over_window,
        #     test_large_both_directions_over_window) fail with
        #     RESOURCE_EXHAUSTED if enqueue-time crediting regresses;
        #   - the shared connection send window (bug 1.2) — the multi-stream
        #     concurrency gate fails with FLOW_CONTROL_ERROR if per-stream
        #     window copies come back.
        # Runs on every push/PR, not just the weekly full tier.
        # The protobuf-layer suite (reflection / health / rich errors against
        # the official grpcio client packages) runs alongside.
        # BB_GRPC_INTEROP_REQUIRE_PROTOBUF=1 turns a missing
        # blackbull-protobuf / client package into a loud failure instead of
        # a silent skip — the gate must not pass on nothing.
        env:
          BB_GRPC_INTEROP_REQUIRE_PROTOBUF: '1'
        run: |
          timeout 120 python -m pytest --timeout=60 -v \
              tests/conformance/grpc/test_grpc_real_client_h2c.py \
              tests/conformance/grpc/test_grpc_protobuf_interop.py
