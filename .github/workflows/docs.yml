name: Deploy docs

on:
  push:
    branches: [master]

# Default to least-privilege; the deploy job grants contents:write
# locally where it is needed.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # mkdocs gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1
        with:
          fetch-depth: 0   # full history lets mkdocs record last-modified dates

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: pip install '.[docs]'

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
