name: Deploy docs

on:
  push:
    branches: [master]

# Default to least-privilege; the deploy job grants contents:write
# locally where it is needed.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # mkdocs gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
        with:
          fetch-depth: 0   # full history lets mkdocs record last-modified dates

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b   # v5.3.0
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: pip install '.[docs]'

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
