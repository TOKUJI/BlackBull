name: Deploy docs

on:
  push:
    branches: [master]

# Default to least-privilege; the deploy job grants contents:write
# locally where it is needed.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # mkdocs gh-deploy pushes to the gh-pages branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
        with:
          fetch-depth: 0   # full history lets mkdocs record last-modified dates

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405   # v6.2.0
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: pip install '.[docs]'

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
