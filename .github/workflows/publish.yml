name: Publish to PyPI

# Triggered by pushing a ``v*`` tag (e.g. ``v0.29.0a1``, ``v0.29.0``).
# Builds wheel + sdist, then uploads via PyPI Trusted Publishing (OIDC) —
# no long-lived API token required.
#
# Prerequisite (one-time, already configured by maintainer):
# PyPI project "blackbull" has a Trusted Publisher entry naming
# ``TOKUJI/BlackBull`` + workflow ``publish.yml``.  If the configured
# workflow filename differs, this file must be renamed to match —
# PyPI's OIDC token exchange will reject any other filename.
#
# Third-party actions pinned to commit SHAs per Sprint 30 Task 6's
# supply-chain hygiene baseline; Dependabot tracks updates.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default to least-privilege; the publish job locally upgrades id-token.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1
        with:
          fetch-depth: 0   # so `python -m build` sees full git context if needed

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1   # v6.3.0
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: List build artefacts
        run: ls -la dist/

      - name: Upload artefacts for the publish job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a   # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI via OIDC
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Optional: bind to a deployment environment so review/approval
    # gates can guard prod releases.  The PyPI Trusted Publisher entry
    # may or may not require the environment name to match — verify
    # against the maintainer's PyPI project settings.
    environment:
      name: pypi
      url: https://pypi.org/project/blackbull/
    permissions:
      id-token: write   # required for OIDC token exchange
    steps:
      - name: Download artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c   # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # SHA pin doesn't work for this action: when ``uses:`` is a
        # commit SHA, GitHub Actions tries to pull a Docker image
        # tagged with that same SHA from ghcr.io.  PyPA only publishes
        # version-tagged images (no per-SHA tags), so SHA-pinning
        # this action fails with ``manifest unknown`` at runtime.
        # Pin to a specific version tag instead — PyPA maintains the
        # tag, and Dependabot still tracks version updates here.
        uses: pypa/gh-action-pypi-publish@v1.14.0
        # No ``with: password:`` — Trusted Publishing exchanges the
        # GitHub OIDC token for a short-lived PyPI token automatically.

  release:
    name: Create GitHub Release
    # Only run when the PyPI publish job succeeded.  If publish failed
    # (e.g. version already exists on PyPI, OIDC token rejected, build
    # divergence), don't create a Release pointing at a tag whose
    # wheels never shipped.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # The default workflow ``permissions: contents: read`` at the top
    # of this file is read-only for least-privilege.  Creating a
    # Release writes to the repository, so locally upgrade contents
    # to ``write`` for this job only.
    permissions:
      contents: write
    steps:
      - name: Checkout
        # Needs CHANGELOG.md for the release notes; default fetch-depth
        # of 1 is enough since we read the file at HEAD of the tag.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1

      - name: Extract changelog section for this tag
        # Pull the ``## [x.y.z]`` block out of CHANGELOG.md so the
        # GitHub Release notes mirror the changelog without manual
        # copy-paste.  ``GITHUB_REF_NAME`` is the tag name (e.g.
        # ``v0.31.3``); the changelog headings drop the leading ``v``.
        # If the changelog has no matching section, the notes file
        # will be empty — ``gh release create`` handles that gracefully
        # by creating a release with no body, which is still better
        # than failing the release publication.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section
          ' CHANGELOG.md > /tmp/notes.md
          echo "--- extracted notes (first 40 lines) ---"
          head -40 /tmp/notes.md

      - name: Create GitHub Release
        # ``gh`` is preinstalled on ubuntu-latest runners; we just need
        # to give it a token with ``contents: write`` (granted above).
        # Title format intentionally minimal — just the tag.  Past
        # releases used descriptive titles ("v0.31.0 — Sprint 32 close
        # …"); those don't survive automation cleanly.  Use
        # ``gh release edit`` after the fact if a descriptive title is
        # wanted for a specific release.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/notes.md \
            --verify-tag
