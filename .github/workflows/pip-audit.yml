name: pip-audit

# Scans BlackBull's dependency tree against the PyPI advisory
# database and OSV.  Fails the build on known-CVE matches.
#
# Triggers on every push and PR to master so the check appears in
# branch-protection's required-status-checks dropdown for all PRs
# (Dependabot bumps that don't touch pyproject.toml included).
# Weekly schedule catches advisories filed against unchanged
# dependencies between PRs; manual dispatch for ad-hoc runs.
#
# Dependabot security alerts are independent of this workflow and
# will surface a CVE PR even when this job has not yet run.  The
# audit here is a hard gate on CI.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405   # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audit BlackBull's declared dependencies (runtime + ``compression``
      # extra) directly via ``pip-audit --requirement``.  This covers
      # h2, hpack, beartype, brotli, zstandard.
      #
      # We do NOT install BlackBull itself: at release-prep time
      # (e.g. v0.29.0a1) the new version isn't on PyPI yet, so any
      # mode that asks pip-audit to look up BlackBull's metadata fails
      # (404 from PyPI, or "distribution marked as editable" when using
      # an editable install).  Extracting deps from ``pyproject.toml``
      # and feeding them to ``pip-audit -r`` sidesteps both — pip-audit
      # resolves the named packages from PyPI and audits THEIR
      # advisory data, never touching BlackBull's own version.
      - name: Audit BlackBull dependencies
        run: |
          pip install pip-audit
          python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              cfg = tomllib.load(f)
          deps = list(cfg['project'].get('dependencies', []))
          deps += list(cfg['project'].get('optional-dependencies', {}).get('compression', []))
          print('\n'.join(deps))
          " > audit-deps.txt
          echo '--- audit-deps.txt ---'
          cat audit-deps.txt
          echo '----------------------'
          pip-audit --strict --requirement audit-deps.txt --progress-spinner off
