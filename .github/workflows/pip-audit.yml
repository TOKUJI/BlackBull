name: pip-audit

# Scans BlackBull's dependency tree against the PyPI advisory
# database and OSV.  Fails the build on known-CVE matches.
#
# Triggers:
#   - on every PR that touches pyproject.toml
#   - weekly schedule to catch advisories filed against unchanged
#     dependencies between PRs
#   - manual dispatch
#
# Dependabot security alerts are independent of this workflow and
# will surface a CVE PR even when this job has not yet run.  The
# audit here is a hard gate on CI.

on:
  push:
    branches: [master]
    paths:
      - 'pyproject.toml'
      - '.github/workflows/pip-audit.yml'
  pull_request:
    branches: [master]
    paths:
      - 'pyproject.toml'
      - '.github/workflows/pip-audit.yml'
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b   # v5.3.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audit BlackBull's installed dependency tree, including the
      # `compression` extra.  This covers h2, hpack, beartype,
      # brotli, zstandard.  The `--strict` flag fails on any
      # advisory match.
      - name: Run pip-audit
        run: |
          pip install '.[compression]'
          pip-audit --strict --progress-spinner off
