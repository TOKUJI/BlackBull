name: pip-audit

# Scans BlackBull's dependency tree against the PyPI advisory
# database and OSV.  Fails the build on known-CVE matches.
#
# Triggers on every push and PR to master so the check appears in
# branch-protection's required-status-checks dropdown for all PRs
# (Dependabot bumps that don't touch pyproject.toml included).
# Weekly schedule catches advisories filed against unchanged
# dependencies between PRs; manual dispatch for ad-hoc runs.
#
# Dependabot security alerts are independent of this workflow and
# will surface a CVE PR even when this job has not yet run.  The
# audit here is a hard gate on CI.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405   # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audit BlackBull's installed dependency tree, including the
      # ``compression`` extra.  This covers h2, hpack, beartype,
      # brotli, zstandard.  The ``--strict`` flag fails on any
      # advisory match.
      #
      # Editable install + ``--skip-editable`` is deliberate: at
      # release-prep time (e.g. v0.29.0a1) the new version isn't on
      # PyPI yet, so a non-editable install would make pip-audit try
      # to look up advisories for a package version PyPI hasn't seen
      # → 404 → workflow failure.  Skipping the editable (the local
      # checkout of BlackBull itself) keeps all real dependencies
      # audited while letting pre-release PRs pass.
      - name: Run pip-audit
        run: |
          pip install -e '.[compression]'
          pip-audit --strict --skip-editable --progress-spinner off
