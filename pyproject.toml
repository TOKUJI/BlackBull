[project]
name = "blackbull"
version = "0.0.1"
description = "Asynchronous ASGI application framework."
readme = "README.md"
requires-python = ">=3.11"

authors = [
    { name = "TOKUJI" }
]

license = { file = "LICENSE" }

dependencies = [
    "h2",
    "httpx",
    "websockets",
    "uvicorn",
    "asgiref",
    "pydantic"
]

[project.urls]
Homepage = "https://github.com/TOKUJI/BlackBull"
Repository = "https://github.com/TOKUJI/BlackBull"

[project.optional-dependencies]
compression = [
    "brotli",
    "zstandard"
]

testing = [
    "pytest",
    "pytest-asyncio"
]

docs = [
    "mkdocs-material",
    "mkdocstrings[python]",
    "mkdocs-gen-files",
    "mkdocs-literate-nav",
    "mkdocs-autorefs"
]

[tool.coverage.run]
source = ["blackbull"]

[tool.coverage.report]
omit = ["*/tests/*",
        "examples/*"
        ]

[tool.setuptools.packages.find]
where = ["."]