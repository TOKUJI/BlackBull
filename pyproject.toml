[project]
name = "blackbull"
# ZeroVer (0.MINOR.PATCH).  MINOR advances at each sprint close (one
# minor per closed sprint); PATCH covers bug fixes / harness work
# between sprints.  No 1.0 commitment until the framework's identity
# and surface have stabilised across several sprints.  See CHANGELOG.md.
version = "0.27.0"
description = "Asynchronous ASGI application framework."
readme = "README.md"
requires-python = ">=3.11"

authors = [
    { name = "TOKUJI" }
]

license = { file = "LICENSE" }

dependencies = [
    "h2",
    "hpack",
]

[project.urls]
Homepage = "https://github.com/TOKUJI/BlackBull"
Repository = "https://github.com/TOKUJI/BlackBull"

[project.scripts]
blackbull = "blackbull.cli:main"

[project.optional-dependencies]
compression = [
    "brotli",
    "zstandard"
]

validation = [
    "beartype",
]

testing = [
    "pytest",
    "pytest-asyncio",
    "pytest-timeout",
    "pytest-cov",
    "beartype",
    "pytest-beartype",
    "httpx[http2]",
    "websockets",
    "hypothesis",
]

docs = [
    "mkdocs-material",
    "mkdocstrings[python]",
    "mkdocs-gen-files",
    "mkdocs-literate-nav",
    "mkdocs-autorefs"
]

speed = [
    "uvloop",
]

reload = [
    "watchfiles",
]

benchmark = []  # k6 and h2load are installed via bench/install.sh (not pip packages)

profiling = [
    "py-spy",
]

[tool.coverage.run]
source = ["blackbull"]

[tool.coverage.report]
omit = ["*/tests/*",
        "examples/*"
        ]

[tool.setuptools.packages.find]
where = ["."]