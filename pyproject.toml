[project]
name = "blackbull"
version = "0.0.1"
description = "Asynchronous ASGI application framework."
readme = "README.md"
requires-python = ">=3.11"

authors = [
    { name = "TOKUJI" }
]

license = { file = "LICENSE" }

dependencies = [
    "h2",
    "hpack",
]

[project.urls]
Homepage = "https://github.com/TOKUJI/BlackBull"
Repository = "https://github.com/TOKUJI/BlackBull"

[project.optional-dependencies]
compression = [
    "brotli",
    "zstandard"
]

validation = [
    "typeguard",
]

testing = [
    "pytest",
    "pytest-asyncio",
    "pytest-timeout",
    "pytest-cov",
    "typeguard",
    "httpx[http2]",
    "websockets",
    "hypothesis",
]

docs = [
    "mkdocs-material",
    "mkdocstrings[python]",
    "mkdocs-gen-files",
    "mkdocs-literate-nav",
    "mkdocs-autorefs"
]

speed = [
    "uvloop",
]

benchmark = []  # k6 and h2load are installed via bench/install.sh (not pip packages)

[tool.coverage.run]
source = ["blackbull"]

[tool.coverage.report]
omit = ["*/tests/*",
        "examples/*"
        ]

[tool.setuptools.packages.find]
where = ["."]